<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Leitos — UPA/RUE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f0f2f5;
  --bg2:      #ffffff;
  --bg3:      #f5f7fa;
  --border:   #d0d7e0;
  --border2:  #e2e8f0;
  --text:     #1a202c;
  --text2:    #4a5568;
  --text3:    #a0aec0;

  --green:    #2d8a4e;
  --green-bg: rgba(45,138,78,.1);
  --red:      #c53030;
  --red-bg:   rgba(197,48,48,.1);
  --yellow:   #b7791f;
  --yellow-bg:rgba(183,121,31,.1);
  --blue:     #2b6cb0;
  --blue-bg:  rgba(43,108,176,.08);

  --sv:  #c53030;
  --sa:  #b7791f;
  --is:  #6b46c1;
  --ia:  #2b6cb0;
  --ip:  #2d8a4e;
  --me:  #2c7a7b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 15px;
  min-height: 100vh;
  padding: 24px;
}

/* ─── HEADER ─── */
.header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

.title {
  font-family: 'IBM Plex Sans Condensed', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.01em;
  line-height: 1;
  margin-bottom: 4px;
}

.subtitle {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text3);
}

.header-right { display: flex; gap: 8px; align-items: center; }

.btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  cursor: pointer;
  letter-spacing: .04em;
  transition: all .15s;
}
.btn:hover { border-color: var(--text2); color: var(--text); }
.btn-export { border-color: var(--green); color: var(--green); }
.btn-export:hover { background: var(--green-bg); }

/* ─── STAT PILLS ─── */
.stats { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 14px 18px;
  min-width: 120px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.stat-occ::before  { background: var(--red); }
.stat-free::before { background: var(--green); }
.stat-blk::before  { background: var(--yellow); }
.stat-tot::before  { background: var(--blue); }

.stat-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 26px;
  font-weight: 600;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-occ  .stat-num { color: var(--red); }
.stat-free .stat-num { color: var(--green); }
.stat-blk  .stat-num { color: var(--yellow); }
.stat-tot  .stat-num { color: var(--blue); }

.stat-label { font-size: 12px; color: var(--text2); letter-spacing: .02em; }
.stat-pct   { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text3); margin-top: 2px; }

/* ─── FILTERS ─── */
.filters {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text3);
}

select {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  padding: 7px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  cursor: pointer;
  outline: none;
  transition: border-color .15s;
}
select:focus { border-color: var(--blue); color: var(--text); }

/* ─── SETOR BLOCKS ─── */
.setores-grid { display: flex; flex-direction: column; gap: 14px; }

.setor-block {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  animation: fadeUp .3s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.setor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 18px;
  border-bottom: 1px solid var(--border2);
  background: var(--bg3);
}

.setor-name {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'IBM Plex Sans Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .02em;
  text-transform: uppercase;
  color: var(--text);
}

.setor-stripe { width: 3px; height: 18px; border-radius: 2px; }

.setor-mini-stats { display: flex; gap: 6px; }

.mini-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 500;
}
.mp-occ  { background: var(--red-bg);    color: var(--red);    }
.mp-free { background: var(--green-bg);  color: var(--green);  }
.mp-blk  { background: var(--yellow-bg); color: var(--yellow); }

/* ─── TABLE ─── */
table { width: 100%; border-collapse: collapse; }

th {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 9px 18px;
  text-align: left;
  border-bottom: 1px solid var(--border2);
  background: var(--bg3);
  white-space: nowrap;
}

td {
  padding: 11px 18px;
  border-bottom: 1px solid var(--border2);
  vertical-align: middle;
  color: var(--text2);
  font-size: 14px;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8fafc; }

.td-leito {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text3);
  white-space: nowrap;
}

.td-pac {
  font-size: 14px;
  color: var(--text);
  font-weight: 500;
  max-width: 260px;
}

.td-obs {
  font-size: 13px;
  color: var(--text3);
  max-width: 200px;
}

/* ─── BADGES ─── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.badge:hover { filter: brightness(.92); }

.badge-occ  { background: var(--red-bg);    color: var(--red);    border: 1px solid rgba(197,48,48,.25); }
.badge-free { background: var(--green-bg);  color: var(--green);  border: 1px solid rgba(45,138,78,.25); }
.badge-blk  { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(183,121,31,.25); }

.badge-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.badge-occ  .badge-dot { background: var(--red); }
.badge-free .badge-dot { background: var(--green); }
.badge-blk  .badge-dot { background: var(--yellow); }

/* ─── ACOMPANHANTE ─── */
.ac-yes { color: var(--green); font-size: 16px; font-weight: 700; }
.ac-no  { color: var(--text3); font-size: 16px; }
.ac-na  { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); }

/* ─── EDIT BTN ─── */
.edit-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text3);
  padding: 5px 10px;
  font-size: 15px;
  cursor: pointer;
  transition: all .15s;
  line-height: 1;
}
.edit-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 26px;
  width: 440px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
  animation: modalIn .2s ease both;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(.96) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header { margin-bottom: 20px; }

.modal-eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 4px;
}

.modal-title {
  font-family: 'IBM Plex Sans Condensed', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}

.field-group { margin-bottom: 14px; }

.field-group label {
  display: block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 5px;
}

.field-group input,
.field-group select,
.field-group textarea {
  width: 100%;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px;
  padding: 9px 12px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.field-group input:focus,
.field-group select:focus,
.field-group textarea:focus { border-color: var(--blue); }
.field-group textarea { resize: vertical; min-height: 72px; }

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border2);
}

.btn-save {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .06em;
  padding: 9px 20px;
  border-radius: 7px;
  border: 1px solid var(--green);
  background: var(--green-bg);
  color: var(--green);
  cursor: pointer;
  transition: all .15s;
}
.btn-save:hover { background: var(--green); color: #fff; }

.btn-cancel {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  padding: 9px 20px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.btn-cancel:hover { border-color: var(--text2); color: var(--text); }

/* ─── EMPTY ─── */
.empty {
  padding: 40px;
  text-align: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  color: var(--text3);
  letter-spacing: .05em;
}

/* ─── PROGRESS BAR ─── */
.occ-bar-wrap {
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  margin-top: 5px;
  width: 100%;
  overflow: hidden;
}
.occ-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--red);
  transition: width .4s ease;
}

/* ─── LOCAL BACKGROUNDS ─── */
body.local-upa { background: #f0f2f5; }
body.local-margarita { background: #fffbe6; }
body.local-hmvgm { background: #eaf6ff; }
#filter-local.local-upa { background:#ffffff; }
#filter-local.local-margarita { background:#fff8cc; }
#filter-local.local-hmvgm { background:#e6f4ff; }

/* ─── PASSWORD GATE ─── */
.password-overlay {
  position: fixed;
  inset: 0;
  background: rgba(240,242,245,.96);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  padding: 24px;
}
.password-box {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 26px;
  width: 380px;
  max-width: 95vw;
  box-shadow: 0 20px 60px rgba(0,0,0,.12);
}
.password-error {
  display:none;
  margin-top: 12px;
  padding: 10px 12px;
  border-radius: 7px;
  border: 1px solid rgba(197,48,48,.25);
  background: var(--red-bg);
  color: var(--red);
  font-size: 13px;
}
.password-error.open { display:block; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- PASSWORD GATE -->
<div class="password-overlay" id="password-gate">
  <div class="password-box">
    <div class="modal-header">
      <div class="modal-eyebrow">Acesso restrito</div>
      <div class="modal-title">Mapa de Leitos</div>
    </div>
    <div class="field-group">
      <label>Senha</label>
      <input type="password" id="access-password" placeholder="Digite a senha de acesso" autocomplete="current-password">
    </div>
    <button class="btn-save" style="width:100%;margin-top:4px" onclick="validarSenha()">Entrar</button>
    <div class="password-error" id="password-error">
      Senha Inválida. Tente novamente ou entre em contato com a regulação do local.
      <div style="margin-top:10px;text-align:right"><button class="btn-cancel" onclick="fecharErroSenha()">OK</button></div>
    </div>
  </div>
</div>

<div class="header">
  <div class="header-left">
    <div class="eyebrow">Sistema de gestão hospitalar</div>
    <div class="title">Mapa de Leitos — UPA/RUE</div>
    <div class="subtitle" id="data-hora"></div>
  </div>
  <div class="header-right">
    <button class="btn btn-export" onclick="exportCSV()">↓ Exportar CSV</button>
  </div>
</div>

<div class="stats" id="stats-bar"></div>

<div class="filters">
  <span class="filter-label">Local</span>
  <select id="filter-local" onchange="render()">
    <option value="">Todos</option>
    <option value="UPA">UPA</option>
    <option value="Margarita Morales">Margarita Morales</option>
    <option value="HMVGM">HMVGM</option>
  </select>
  <span class="filter-label" style="margin-left:8px">Setor</span>
  <select id="filter-setor" onchange="render()">
    <option value="">Todos</option>
  </select>
  <span class="filter-label" style="margin-left:8px">Ocupação</span>
  <select id="filter-occ" onchange="render()">
    <option value="">Todos</option>
    <option value="Leito Ocupado">Ocupado</option>
    <option value="Leito Disponível">Disponível</option>
    <option value="Leito Bloqueado">Bloqueado</option>
  </select>
</div>

<div class="setores-grid" id="table-body"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-eyebrow" id="modal-eyebrow"></div>
      <div class="modal-title" id="modal-title">Editar leito</div>
    </div>
    <div class="field-group">
      <label>Ocupação</label>
      <select id="edit-occ">
        <option>Leito Ocupado</option>
        <option>Leito Disponível</option>
        <option>Leito Bloqueado</option>
      </select>
    </div>
    <div class="field-group">
      <label>Paciente</label>
      <input type="text" id="edit-pac" placeholder="Nome completo, idade">
    </div>
    <div class="field-group">
      <label>Acompanhante</label>
      <select id="edit-ac">
        <option>Não</option>
        <option>Sim</option>
        <option>Não se Aplica</option>
      </select>
    </div>
    <div class="field-group">
      <label>Observações</label>
      <textarea id="edit-obs" placeholder="Observações clínicas ou operacionais..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEdit()">✓ Salvar</button>
    </div>
  </div>
</div>

<script>
const SETOR_COLOR = {
  "Sala Vermelha":        "var(--sv)",
  "Sala Amarela":         "var(--sa)",
  "Isolamento":           "var(--is)",
  "Internação Adulto":    "var(--ia)",
  "Internação Pediátrica":"var(--ip)",
  "Medicação":            "var(--me)",
  "Emergência":           "var(--sv)"
};

const LOCAL_CLASS = {
  "UPA": "local-upa",
  "Margarita Morales": "local-margarita",
  "HMVGM": "local-hmvgm"
};

const SENHAS_VALIDAS = ['Upa1234@', 'MM1234@', 'ZL1234', 'Samu1234@'];

const ACESSOS = {
  'Upa1234@':  { nome: 'UPA', localEditavel: 'UPA', somenteLeitura: false },
  'MM1234@':   { nome: 'Margarita Morales', localEditavel: 'Margarita Morales', somenteLeitura: false },
  'ZL1234':    { nome: 'HMVGM', localEditavel: 'HMVGM', somenteLeitura: false },
  'Samu1234@': { nome: 'SAMU', localEditavel: null, somenteLeitura: true }
};

let acessoAtual = null;

const LEITOS_PREVISTOS_POR_LOCAL = {
  "Margarita Morales": [
    ["Sala Vermelha", "Leito 1 (SV)"],
    ["Sala Vermelha", "Leito 2 (SV)"],
    ["Emergência", "Leito 3 (SV)"],
    ["Sala Amarela", "Leito 1 (SA)"],
    ["Isolamento", "Isolamento 1  (SA/SV)"],
    ["Internação Adulto", "Feminino 1 (F1)"],
    ["Internação Adulto", "Feminino 2 (F2)"],
    ["Internação Adulto", "Feminino 3 (F3)"],
    ["Internação Adulto", "Feminino 4 (F4)"],
    ["Internação Adulto", "Feminino 5 (F5)"],
    ["Internação Adulto", "Masculino 1 (M1)"],
    ["Internação Adulto", "Masculino 2 (M2)"],
    ["Internação Adulto", "Masculino 3 (M3)"],
    ["Internação Adulto", "Masculino 4 (M4)"],
    ["Internação Adulto", "Masculino 5 (M5)"],
    ["Internação Pediátrica", "Leito 1 (PED)"],
    ["Internação Pediátrica", "Leito 2 (PED)"],
    ["Internação Pediátrica", "Leito 3 (PED)"],
    ["Internação Pediátrica", "Leito 4 (PED)"],
    ["Internação Pediátrica", "Leito 5 (PED)"]
  ],
  "HMVGM": [
    ["Emergência", "Leito 1 (U/E)"],
    ["Emergência", "Leito 2 (U/E)"],
    ["Internação Adulto", "Feminino 1 (F1)"],
    ["Internação Adulto", "Feminino 2 (F2)"],
    ["Internação Adulto", "Feminino 3 (F3)"],
    ["Internação Adulto", "Feminino 4 (F4)"],
    ["Internação Adulto", "Feminino 5 (F5)"],
    ["Internação Adulto", "Feminino 6 (F6)"],
    ["Internação Adulto", "Feminino 7 (F7)"],
    ["Internação Adulto", "Feminino 8 (F8)"],
    ["Internação Adulto", "Feminino 9 (F9)"],
    ["Internação Adulto", "Masculino 1 (M1)"],
    ["Internação Adulto", "Masculino 2 (M2)"],
    ["Internação Adulto", "Masculino 3 (M3)"],
    ["Internação Adulto", "Masculino 4 (M4)"],
    ["Internação Adulto", "Masculino 5 (M5)"],
    ["Internação Adulto", "Masculino 6 (M6)"],
    ["Internação Adulto", "Masculino 7 (M7)"],
    ["Internação Adulto", "Masculino 8 (M8)"],
    ["Internação Adulto", "Masculino 9 (M9)"]
  ]
};

function criarLeitosPrevistos(local) {
  return (LEITOS_PREVISTOS_POR_LOCAL[local] || []).map(([setor, leito], index) => ({
    id: 'previsto-' + local.replace(/\s+/g, '-').toLowerCase() + '-' + index,
    local,
    s: setor,
    l: leito,
    o: 'Leito Disponível',
    p: '',
    ac: 'Não',
    obs: '',
    previsto: true,
    ordemPrevista: index
  }));
}

function chaveLeito(r) {
  return [r.local, r.s, r.l].map(v => String(v || '').trim().toUpperCase()).join('|');
}

function completarLeitosPrevistos(rows) {
  let completos = [...rows];

  Object.keys(LEITOS_PREVISTOS_POR_LOCAL).forEach(local => {
    const existentes = completos.filter(r => r.local === local).map(chaveLeito);
    const contagemExistentes = existentes.reduce((acc, chave) => {
      acc[chave] = (acc[chave] || 0) + 1;
      return acc;
    }, {});

    const previstos = criarLeitosPrevistos(local);
    const contagemPrevistos = {};

    previstos.forEach(previsto => {
      const chave = chaveLeito(previsto);
      contagemPrevistos[chave] = (contagemPrevistos[chave] || 0) + 1;

      if ((contagemExistentes[chave] || 0) < contagemPrevistos[chave]) {
        completos.push(previsto);
      }
    });
  });

  return completos;
}

const SUPABASE_URL = 'https://msdugsbtodlizowykgjw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zZHVnc2J0b2RsaXpvd3lrZ2p3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTc5NzMsImV4cCI6MjA5NDEzMzk3M30.iO_LMlMEPZfmhhYK6uX7aG-dFkU_wC57LA37SrElHTk';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let data = [];
let editIdx = null;
let realtimeLigado = false;

function now() {
  return new Date().toLocaleString('pt-BR', {
    day:'2-digit',
    month:'2-digit',
    year:'numeric',
    hour:'2-digit',
    minute:'2-digit'
  });
}

function normalizarLocal(valor) {
  const v = (valor || 'UPA').toString().trim().toUpperCase();
  if (v.includes('MARGARITA')) return 'Margarita Morales';
  if (v.includes('HMVGM')) return 'HMVGM';
  return 'UPA';
}

function mapLeito(row) {
  return {
    id: row.id,
    local: normalizarLocal(row.local),
    s: row.setor,
    l: row.leito,
    o: row.ocupacao,
    p: row.paciente || '',
    ac: row.acompanhante || 'Não',
    obs: row.observacoes || ''
  };
}

function removerDuplicados(rows) {
  const vistos = new Set();
  return rows.filter(r => {
    const chave = [r.local, r.s, r.l].map(v => String(v || '').trim().toUpperCase()).join('|');
    if (vistos.has(chave)) return false;
    vistos.add(chave);
    return true;
  });
}

async function carregarLeitos() {
  const { data: rows, error } = await supabaseClient
    .from('leitos')
    .select('*')
    .order('id', { ascending: true });

  if (error) {
    console.error('Erro ao carregar leitos:', error);
    document.getElementById('table-body').innerHTML =
      '<div class="empty">Erro ao carregar os leitos do Supabase.</div>';
    return;
  }

  data = completarLeitosPrevistos(removerDuplicados(rows.map(mapLeito)));
  atualizarFiltroSetores();
  document.getElementById('data-hora').textContent = 'Atualizado em ' + now();
  render();
}

function atualizarFiltroSetores() {
  const sel = document.getElementById('filter-setor');
  const valorAtual = sel.value;
  const localAtual = document.getElementById('filter-local')?.value || '';

  sel.innerHTML = '<option value="">Todos</option>';

  const base = localAtual ? data.filter(r => r.local === localAtual) : data;
  const setores = [...new Set(base.map(r => r.s))];

  setores.forEach(s => {
    const o = document.createElement('option');
    o.value = s;
    o.textContent = s;
    sel.appendChild(o);
  });

  if (setores.includes(valorAtual)) {
    sel.value = valorAtual;
  }
}

function escutarAlteracoesRealtime() {
  if (realtimeLigado) return;
  realtimeLigado = true;

  supabaseClient
    .channel('realtime-leitos')
    .on(
      'postgres_changes',
      { event: '*', schema: 'public', table: 'leitos' },
      () => {
        carregarLeitos();
      }
    )
    .subscribe();
}

function badgeClass(o) {
  return o === 'Leito Ocupado' ? 'badge-occ' : o === 'Leito Bloqueado' ? 'badge-blk' : 'badge-free';
}

function badgeLabel(o) {
  return o === 'Leito Ocupado' ? 'Ocupado' : o === 'Leito Bloqueado' ? 'Bloqueado' : 'Disponível';
}

function podeEditarLeito(r) {
  if (!acessoAtual || acessoAtual.somenteLeitura) return false;
  return r.local === acessoAtual.localEditavel;
}

function avisoSemPermissao() {
  if (acessoAtual && acessoAtual.somenteLeitura) {
    alert('Acesso SAMU: modo somente leitura. Alterações não são permitidas.');
    return;
  }
  alert('Esta senha permite alterar apenas os leitos do local correspondente.');
}

function renderStats(base = data) {
  const occ  = base.filter(r => r.o === 'Leito Ocupado').length;
  const free = base.filter(r => r.o === 'Leito Disponível').length;
  const blk  = base.filter(r => r.o === 'Leito Bloqueado').length;
  const total = base.length;
  const pct = total ? Math.round(occ / total * 100) : 0;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card stat-occ"><div class="stat-num">${occ}</div><div class="stat-label">Ocupados</div></div>
    <div class="stat-card stat-free"><div class="stat-num">${free}</div><div class="stat-label">Disponíveis</div></div>
    <div class="stat-card stat-blk"><div class="stat-num">${blk}</div><div class="stat-label">Bloqueados</div></div>
    <div class="stat-card stat-tot">
      <div class="stat-num">${total}</div>
      <div class="stat-label">Total de leitos</div>
      <div class="occ-bar-wrap"><div class="occ-bar-fill" style="width:${pct}%"></div></div>
      <div class="stat-pct">${pct}% de ocupação</div>
    </div>
  `;
}

function render() {
  const fL = document.getElementById('filter-local').value;
  const fS = document.getElementById('filter-setor').value;
  const fO = document.getElementById('filter-occ').value;

  document.body.classList.remove('local-upa', 'local-margarita', 'local-hmvgm');
  document.getElementById('filter-local').classList.remove('local-upa', 'local-margarita', 'local-hmvgm');
  if (fL && LOCAL_CLASS[fL]) {
    document.body.classList.add(LOCAL_CLASS[fL]);
    document.getElementById('filter-local').classList.add(LOCAL_CLASS[fL]);
  }

  atualizarFiltroSetores();

  const filtrados = data.filter(r => {
    if (fL && r.local !== fL) return false;
    if (fS && r.s !== fS) return false;
    if (fO && r.o !== fO) return false;
    return true;
  });

  renderStats(filtrados);

  const grouped = {};
  filtrados.forEach(r => {
    const i = data.indexOf(r);
    const grupo = fL ? r.s : `${r.local} • ${r.s}`;
    if (!grouped[grupo]) grouped[grupo] = [];
    grouped[grupo].push({...r, idx: i});
  });

  const keys = Object.keys(grouped);

  if (!keys.length) {
    document.getElementById('table-body').innerHTML =
      '<div class="empty">— Nenhum leito encontrado para os filtros selecionados —</div>';
    return;
  }

  document.getElementById('table-body').innerHTML = keys.map(grupo => {
    const rows = grouped[grupo];
    const setor = rows[0].s;
    const color = SETOR_COLOR[setor] || '#888';
    const occ  = rows.filter(r => r.o === 'Leito Ocupado').length;
    const free = rows.filter(r => r.o === 'Leito Disponível').length;
    const blk  = rows.filter(r => r.o === 'Leito Bloqueado').length;

    const miniStats = [
      occ  ? `<span class="mini-pill mp-occ">${occ} ocup.</span>` : '',
      free ? `<span class="mini-pill mp-free">${free} disp.</span>` : '',
      blk  ? `<span class="mini-pill mp-blk">${blk} bloq.</span>` : '',
    ].filter(Boolean).join('');

    const trs = rows.map(r => {
      const pac = r.p ? r.p : '<span style="color:var(--text3)">—</span>';
      const obs = r.obs ? `<span style="color:var(--text2)">${r.obs}</span>` : '<span style="color:var(--text3)">—</span>';
      const ac  = r.ac === 'Sim'
        ? '<span class="ac-yes">✓</span>'
        : r.ac === 'Não se Aplica'
        ? '<span class="ac-na">N/A</span>'
        : '<span class="ac-no">—</span>';

      return `<tr>
        <td class="td-leito">${r.l}</td>
        <td><button class="badge ${badgeClass(r.o)}" onclick="cycleBadge(${r.idx})" title="Clique para alternar">
          <span class="badge-dot"></span>${badgeLabel(r.o)}
        </button></td>
        <td class="td-pac">${pac}</td>
        <td style="text-align:center">${ac}</td>
        <td class="td-obs">${obs}</td>
        <td><button class="edit-btn" onclick="openModal(${r.idx})" title="Editar">✎</button></td>
      </tr>`;
    }).join('');

    return `<div class="setor-block">
      <div class="setor-header">
        <div class="setor-name">
          <span class="setor-stripe" style="background:${color}"></span>${grupo}
        </div>
        <div class="setor-mini-stats">${miniStats}</div>
      </div>
      <table>
        <thead><tr>
          <th style="width:150px">Leito</th>
          <th style="width:130px">Ocupação</th>
          <th>Paciente</th>
          <th style="width:80px;text-align:center">Acomp.</th>
          <th>Observações</th>
          <th style="width:50px"></th>
        </tr></thead>
        <tbody>${trs}</tbody>
      </table>
    </div>`;
  }).join('');
}

async function cycleBadge(i) {
  if (!podeEditarLeito(data[i])) {
    avisoSemPermissao();
    return;
  }

  if (data[i].previsto) {
    alert('Este leito está previsto na estrutura do local, mas ainda não possui registro no banco de dados. Para editar, cadastre este leito no Supabase.');
    return;
  }

  const opts = ['Leito Disponível', 'Leito Ocupado', 'Leito Bloqueado'];
  const cur = opts.indexOf(data[i].o);
  const novoStatus = opts[(cur + 1) % 3];

  const { error } = await supabaseClient
    .from('leitos')
    .update({ ocupacao: novoStatus })
    .eq('id', data[i].id);

  if (error) {
    console.error('Erro ao atualizar ocupação:', error);
    alert('Erro ao atualizar ocupação do leito.');
    return;
  }

  data[i].o = novoStatus;
  document.getElementById('data-hora').textContent = 'Atualizado em ' + now();
  render();
}

function openModal(i) {
  const r = data[i];

  if (!podeEditarLeito(r)) {
    avisoSemPermissao();
    return;
  }

  editIdx = i;

  document.getElementById('modal-eyebrow').textContent = r.local + ' • ' + r.s;
  document.getElementById('modal-title').textContent = r.l;
  document.getElementById('edit-occ').value = r.o;
  document.getElementById('edit-pac').value = r.p || '';
  document.getElementById('edit-ac').value = r.ac || 'Não';
  document.getElementById('edit-obs').value = r.obs || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editIdx = null;
}

async function saveEdit() {
  if (editIdx === null) return;

  const leitoAtual = data[editIdx];

  if (!podeEditarLeito(leitoAtual)) {
    avisoSemPermissao();
    closeModal();
    return;
  }

  if (leitoAtual.previsto) {
    alert('Este leito está previsto na estrutura do local, mas ainda não possui registro no banco de dados. Para editar, cadastre este leito no Supabase.');
    return;
  }

  const payload = {
    ocupacao: document.getElementById('edit-occ').value,
    paciente: document.getElementById('edit-pac').value,
    acompanhante: document.getElementById('edit-ac').value,
    observacoes: document.getElementById('edit-obs').value
  };

  const { error } = await supabaseClient
    .from('leitos')
    .update(payload)
    .eq('id', leitoAtual.id);

  if (error) {
    console.error('Erro ao salvar edição:', error);
    alert('Erro ao salvar edição do leito.');
    return;
  }

  data[editIdx] = {
    ...leitoAtual,
    o: payload.ocupacao,
    p: payload.paciente,
    ac: payload.acompanhante,
    obs: payload.observacoes
  };

  document.getElementById('data-hora').textContent = 'Atualizado em ' + now();
  closeModal();
  render();
}

function exportCSV() {
  const rows = [['Local','Setor','Leito','Ocupação','Paciente','Acompanhante','Observações']];

  data.forEach(r => rows.push([r.local, r.s, r.l, r.o, r.p, r.ac, r.obs]));

  const csv = rows
    .map(r => r.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(','))
    .join('\n');

  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download = 'mapa_leitos_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function validarSenha() {
  const input = document.getElementById('access-password');
  const senha = input.value;

  if (SENHAS_VALIDAS.includes(senha)) {
    acessoAtual = ACESSOS[senha];
    document.getElementById('password-gate').style.display = 'none';
    input.value = '';
    carregarLeitos();
    escutarAlteracoesRealtime();
    return;
  }

  document.getElementById('password-error').classList.add('open');
}

function fecharErroSenha() {
  document.getElementById('password-error').classList.remove('open');
  const input = document.getElementById('access-password');
  input.value = '';
  input.focus();
}

document.getElementById('access-password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') validarSenha();
});

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('data-hora').textContent = 'Aguardando senha de acesso...';
document.getElementById('access-password').focus();
</script>
